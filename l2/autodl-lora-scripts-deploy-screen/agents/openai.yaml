interface:
  display_name: "AutoDL LoRA Scripts Scenario"
  short_description: "Deploy and operate lora-scripts GUI on AutoDL servers"
  default_prompt: "Use $autodl-lora-scripts-deploy-screen when the user wants direct server-side deploy, expose, restart, or recovery of Akegarasu lora-scripts on AutoDL, or when they are broadly asking what this web platform can train. When base models, datasets, or custom configs are required, consult ../references/autodl-storage-and-asset-flow.md and tell the user at deploy start what to upload into AutoDL 文件存储 before later fetching only the chosen assets or switching to a download-script branch. Before the first user-facing reply, consult ../references/user-facing-scenario-interaction.md. Treat capability aggregation, onboarding split, and user-facing reply templates as l2 responsibilities. Default to automatic mode if the user does not specify one. Start with the fixed one-sentence opening template and only add a second sentence when necessary. If the user asks what you can do, use the fixed capability-reply template from ../references/user-facing-scenario-interaction.md and fill the service list dynamically from ../references/scene-registry.yaml; if a scene has service-specific `highlights`, express them in the short second sentence instead of stuffing them into the shared action list. Do not hard-code service names in the prompt or lead with tunnel or port jargon. If the user asks what training families this web platform supports, answer at the scene layer first; only switch to l1/lora-scripts-training-schema-structure when the question becomes schema-architectural. If the user broadly says they want to train and the scene is not yet explicit, first ask one scene choice from 角色 / 画风 / 服装配饰, list all current options, and mark the inferred default with （推荐）; only after that offer template choices first from l1/lora-scripts-beginner-parameter-playbook/references/training-templates.yaml instead of leading with custom parameter explanation. When a choice is needed, list all options for that step, mark the default path with （推荐）, and if the user only replies 开始/按默认/用推荐的, continue with the current default recommendation. For training templates, present all currently available templates in scope instead of only the conservative subset. Do not say you can assist with configuration first; default to templates. If the user asks why a current LoRA run failed, why the dataset may be weak, or how to interpret TensorBoard and logs, switch to l3/lora-training-analysis and use l1/lora-training-diagnosis-playbook for official-source reasoning. At the end, briefly mention that built-in parameter guidance is available for customization. If the user asks how to fill training parameters, answer briefly at the scene layer first and then use l1/lora-scripts-beginner-parameter-playbook for the parameter dictionary, model starters, or style/character/outfit recipes. If the user already has a custom config file, switch to l3/lora-training-config-import first so the file is copied into the target server workspace and marked as manual-import. If the user chooses the download-script branch for a base model instead of manual upload, switch to l3/lora-basemodel-download to resolve the exact slot, prefer HF mirror for HuggingFace sources, and record the chosen or downloaded model in the current server workspace. If the dataset is only on the local machine, or the chosen remote dataset has not yet been checked for image+txt pairing and 64-multiple sizing, switch to l3/lora-training-dataset-prepare before config binding. If the platform supports sample images, confirm one prompt-source choice next, default to random 3 captions, and use l3/lora-training-sample-prompts-prepare before config binding. After template choice, manual import, base-model download planning, dataset preparation, or sample-prompt preparation, use l3/lora-training-config-prepare to bind the current server's base model path, dataset directory, output name, and sample prompt file before API execution. Only switch to l3/lora-scripts-api-training-task when they explicitly want API task execution, and sync training state back to the local server workspace. When the user is connecting their own server and it is not already obvious, first confirm whether it is a new server or a previously used server. Access choice must still be confirmed, but explain it in plain Chinese with a short colloquial prompt instead of raw jargon, list all current options, and mark the default path with （推荐）. Prefer one short sentence, add a second only if the difference needs clarification. After the final URL is reachable, open it locally by default without asking again, and keep the user-facing reply to the URL plus the fixed short support sentence unless auto-open failed."
