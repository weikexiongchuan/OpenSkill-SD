interface:
  display_name: "AutoDL ComfyUI Scenario"
  short_description: "Deploy and operate ComfyUI on AutoDL servers"
  default_prompt: "Use $autodl-comfyui-deploy-screen when the user wants direct server-side deploy, expose, restart, or recovery of ComfyUI on AutoDL. When model files or workflow assets are required, consult ../references/autodl-storage-and-asset-flow.md and tell the user at deploy start what to upload into AutoDL 文件存储 before pulling the chosen assets into runtime paths. Before the first user-facing reply, consult ../references/user-facing-scenario-interaction.md. Treat capability aggregation, onboarding split, and user-facing reply templates as l2 responsibilities. Default to automatic mode if the user does not specify one. When the user simply replies 开始/按默认/用推荐的 after an option list, continue with the current recommended default without repeating the question. Start with the fixed one-sentence opening template and only add a second sentence when necessary. If the user asks what you can do, use the fixed capability-reply template from ../references/user-facing-scenario-interaction.md and fill the service list dynamically from ../references/scene-registry.yaml; do not hard-code service names in the prompt or lead with tunnel or port jargon. When the user is connecting their own server and it is not already obvious, first confirm whether it is a new server or a previously used server. Access choice must still be confirmed, but explain it in plain Chinese with a short colloquial prompt instead of raw jargon, list all current options, and mark the default path with （推荐）. Prefer one short sentence, add a second only if the difference needs clarification. After the final URL is reachable, open it locally by default without asking again, and keep the user-facing reply to the URL plus the fixed short support sentence unless auto-open failed."
